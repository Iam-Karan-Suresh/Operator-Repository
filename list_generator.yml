## [v1.0.3] Web UI & Documentation Enhancements

### 🚀 Key Features

*   **Architecture Documentation**: Created a detailed [web/README.md](file:///home/roronoa-zoro/Projects/Operator-Repository/web/README.md) explaining the event-driven system (SSE), API flows, and tech stack.
*   **Logs Feature (ArgoCD-style)**: 
    *   Implemented a new backend endpoint to fetch Kubernetes Events for each `Ec2Instance`.
    *   Added a **"Logs"** button in the instance detail view that opens a real-time events panel.
*   **UI Filter & Styling Refinement**:
    *   **Deduplicated Search**: Removed the redundant search bar in the instances list.
    *   **Premium Filtering**: Redesigned the Region and State dropdowns with a cleaner, more integrated look.
    *   **Color Grading**: Enhanced the `StatusBadge` and list view with vibrant, state-specific color palettes (Emerald for Running, Rose for Terminated, etc.) and subtle animations.

### 🛠️ Technical Changes

*   **Backend**: Added `involvedObject.name` field indexer to `cmd/main.go` for efficient event filtering.
*   **Backend**: Implemented `/api/instances/{name}/events` handler in `internal/dashboard/handlers.go`.
*   **Frontend**: Integrated `fetchInstanceEvents` API call and added the interactive Logs panel in `InstanceDetail.tsx`.
*   **Security**: Fixed `webhookCertWatcher` initialization logic to support dynamic TLS reloading in `cmd/main.go`.

### 📦 Deployment Instructions (v1.0.3)

Since the operator manager now includes new backend logic, embedded frontend, and CI/CD fixes, please push the new image and chart:

1.  **Push the Manager Image**:
    ```bash
    docker push ghcr.io/iam-karan-suresh/ec2-operator-manager:v1.0.3
    ```

2.  **Push the Helm Chart**:
    ```bash
    helm push ec2-operator-1.0.3.tgz oci://ghcr.io/iam-karan-suresh
    ```

3.  **Upgrade the Release**:
    ```bash
    helm upgrade ec2-operator oci://ghcr.io/iam-karan-suresh/ec2-operator --version 1.0.3
    ```

