## 🛠️ CI/CD Pipeline Fixes (GitHub Actions)

I have resolved the failures in the GitHub Actions pipeline by addressing over 20 linting and compilation issues:

*   **Linting (golangci-lint)**:
    *   **Errcheck**: Fixed 7+ unchecked errors in `handlers.go` (JSON encoding, I/O writes).
    *   **Goconst**: Extracted magic strings ("running", "terminated", "default") into named constants.
    *   **Staticcheck**: Resolved empty branches (SA9003) and non-idiomatic switch statements (QF1003).
    *   **Scoped Scanning**: Updated the `Makefile` to run `golangci-lint` only on `api/...`, `cmd/...`, and `internal/...`, successfully bypassing third-party code in `node_modules` that was causing false positives.
*   **Compilation**:
    *   Fixed incorrect package aliasing in `cmd/dashboard/main.go`.
    *   Corrected `corev1` import aliasing in `internal/controller/ec2instance_controller.go`.
*   **Eventing**:
    *   Added a `Recorder` to the `Ec2InstanceReconciler` to support Kubernetes Event publishing for the new "Logs" feature.

