{{- if .Values.dashboard.enable }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      {{- include "chart.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "chart.labels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
      annotations:
        kubectl.kubernetes.io/default-container: dashboard
    spec:
      serviceAccountName: {{ .Values.dashboard.serviceAccountName }}
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.imagePullPolicy }}
          env:
            - name: OPENCOST_URL
              value: "http://{{ .Release.Name }}-opencost.{{ .Release.Namespace }}.svc.cluster.local:9003"
            - name: AWS_REGION
              value: {{ .Values.awsCredentials.region | default "us-east-1" }}
            {{- if .Values.awsCredentials.secretName }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.awsCredentials.secretName }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.awsCredentials.secretName }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- else if and .Values.awsCredentials.accessKeyId .Values.awsCredentials.secretAccessKey }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.awsCredentials.accessKeyId }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.awsCredentials.secretAccessKey }}
            {{- end }}
            - name: AWS_EC2_METADATA_DISABLED
              value: "true"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
{{- end }}
