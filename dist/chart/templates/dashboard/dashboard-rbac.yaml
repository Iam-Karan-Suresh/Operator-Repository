{{- if and .Values.dashboard.enable .Values.rbac.enable }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.dashboard.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "chart.name" . }}-dashboard-role
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
rules:
  - apiGroups:
      - compute.cloud.com
    resources:
      - ec2instances
      - ec2instances/status
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/proxy
      - pods/log
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "chart.name" . }}-dashboard-rolebinding
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "chart.name" . }}-dashboard-role
subjects:
  - kind: ServiceAccount
    name: {{ .Values.dashboard.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
{{- end }}
