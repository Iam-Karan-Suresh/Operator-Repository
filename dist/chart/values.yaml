# [MANAGER]: Manager Deployment Configurations
controllerManager:
  replicas: 1
  container:
    image:
      repository: ghcr.io/iam-karan-suresh/ec2-operator-manager
      tag: v1.0.3
    imagePullPolicy: IfNotPresent
    args:
      - "--leader-elect"
      - "--metrics-bind-address=:8443"
      - "--health-probe-bind-address=:8081"
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      httpGet:
        path: /healthz
        port: 8081
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      httpGet:
        path: /readyz
        port: 8081
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  terminationGracePeriodSeconds: 10
  serviceAccountName: operator-controller-manager

# [DASHBOARD]: Web UI Dashboard Configurations
dashboard:
  enable: true
  replicas: 1
  image:
    repository: docker.io/karanwebdev/ec2-dashboard
    tag: latest
  imagePullPolicy: IfNotPresent
  port: 3000
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
  serviceAccountName: operator-dashboard
  service:
    type: ClusterIP
    port: 3000

# [RBAC]: To enable RBAC (Permissions) configurations
rbac:
  enable: true

# [CRDs]: To enable the CRDs
crd:
  # This option determines whether the CRDs are included
  # in the installation process.
  enable: true

  # Enabling this option adds the "helm.sh/resource-policy": keep
  # annotation to the CRD, ensuring it remains installed even when
  # the Helm release is uninstalled.
  # NOTE: Removing the CRDs will also remove all cert-manager CR(s)
  # (Certificates, Issuers, ...) due to garbage collection.
  keep: true

# [METRICS]: Set to true to generate manifests for exporting metrics.
# To disable metrics export set false, and ensure that the
# ControllerManager argument "--metrics-bind-address=:8443" is removed.
metrics:
  enable: true

# [CERT-MANAGER]: To enable cert-manager injection to webhooks set true
certmanager:
  enable: false

# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false

# [OBSERVABILITY]: Unified Stack Configuration
prometheus:
  enabled: true
  server:
    persistentVolume:
      enabled: false
    service:
      type: NodePort
    resources:
      limits: { cpu: 500m, memory: 512Mi }
      requests: { cpu: 100m, memory: 128Mi }

grafana:
  enabled: true
  service:
    type: NodePort
  persistence:
    enabled: false
  adminPassword: admin
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server
        access: proxy
        isDefault: true
      - name: Jaeger
        type: jaeger
        url: http://jaeger-query:16686
        access: proxy

jaeger:
  enabled: true
  collector:
    enabled: false
  query:
    enabled: false
    service:
      type: NodePort
      clusterIP: ""
  agent:
    enabled: false
  allInOne:
    enabled: true
    image: jaegertracing/all-in-one
    tag: 1.60.0
    service:
      type: NodePort

opencost:
  enabled: true
  service:
    type: NodePort
  opencost:
    prometheus:
      internal:
        enabled: false
      external:
        url: http://prometheus-server

# [PERSONALIZATION]: UI Settings
uiSettings:
  name: "User Name"
  profession: "Project Lead"
  team: "Cloud Operations"

# [AWS]: AWS Credentials and Region
awsCredentials:
  secretName: "aws-credentials"
  accessKeyId: ""
  secretAccessKey: ""
  region: "us-east-1"
